spring:
  application:
    name: churrasco-cup
  datasource:
    # SQLite file. In Docker it is overridden with CHURRASCO_DB_PATH=/data/churrasco.db
    url: jdbc:sqlite:${CHURRASCO_DB_PATH:./data/churrasco.db}
    driver-class-name: org.sqlite.JDBC
    hikari:
      maximum-pool-size: ${CHURRASCO_DB_POOL_SIZE:5}
      # Avoids "database is locked" errors under concurrency by waiting for the lock
      connection-init-sql: "PRAGMA busy_timeout=5000"
  sql:
    init:
      # Runs schema.sql at startup (idempotent). SQLite is not "embedded" for
      # Spring, hence 'always' is required.
      mode: always
  jpa:
    open-in-view: false
    hibernate:
      # The schema is governed by schema.sql, not Hibernate (SQLite + auto DDL is problematic).
      ddl-auto: none
    properties:
      hibernate:
        dialect: org.hibernate.community.dialect.SQLiteDialect

server:
  port: ${CHURRASCO_PORT:8080}

churrasco:
  cors:
    # Allowed origin patterns (allowedOriginPatterns), comma-separated.
    # Defaults to "*" to work in dev (Vite) and when served from any office host.
    allowed-origins: ${CHURRASCO_CORS_ORIGINS:*}

logging:
  level:
    org.hibernate.SQL: warn
