spring:
  application:
    name: churrasco-cup
  datasource:
    # Fichero SQLite. En Docker se sobreescribe con CHURRASCO_DB_PATH=/data/churrasco.db
    url: jdbc:sqlite:${CHURRASCO_DB_PATH:./data/churrasco.db}
    driver-class-name: org.sqlite.JDBC
    hikari:
      maximum-pool-size: ${CHURRASCO_DB_POOL_SIZE:5}
      # Evita errores "database is locked" bajo concurrencia esperando al lock
      connection-init-sql: "PRAGMA busy_timeout=5000"
  sql:
    init:
      # Ejecuta schema.sql al arrancar (idempotente). SQLite no es "embedded" para
      # Spring, por eso hace falta 'always'.
      mode: always
  jpa:
    open-in-view: false
    hibernate:
      # El esquema lo gobierna schema.sql, no Hibernate (SQLite + DDL automatico da problemas).
      ddl-auto: none
    properties:
      hibernate:
        dialect: org.hibernate.community.dialect.SQLiteDialect

server:
  port: ${CHURRASCO_PORT:8080}

churrasco:
  cors:
    # Patrones de origen permitidos (allowedOriginPatterns), coma-separados.
    # Por defecto "*" para funcionar en dev (Vite) y servido desde cualquier host de la oficina.
    allowed-origins: ${CHURRASCO_CORS_ORIGINS:*}

logging:
  level:
    org.hibernate.SQL: warn
